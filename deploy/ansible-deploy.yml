---
# Deploy engram-web to tela (rootless, user-level Quadlet)
#
# Usage (run on tela as eddie with local connection):
#   ansible-playbook -i "127.0.0.1," deploy/ansible-deploy.yml \
#     --connection local -e engram_web_src_dir=<path>
#
# Variables:
#   engram_web_src_dir: path to checked-out repo on tela

- name: Deploy engram-web
  hosts: all
  gather_facts: false

  vars:
    service_name: engram-web
    quadlet_dir: /home/eddie/.config/containers/systemd
    engram_web_src_dir: "{{ ansible_env.HOME }}/engram-web"

  tasks:
    - name: Build container image from source
      ansible.builtin.command:
        cmd: >
          podman build
          -t localhost/engram-web:latest
          -f deploy/Dockerfile
          .
        chdir: "{{ engram_web_src_dir }}"
      changed_when: true
      notify: Reload and restart engram-web

    - name: Tag image for registry
      ansible.builtin.command:
        cmd: >
          podman tag
          localhost/engram-web:latest
          registry.starbluesolutions.net/engram-web:{{ build_number | default('latest') }}
      changed_when: true

    - name: Tag image as latest in registry
      ansible.builtin.command:
        cmd: >
          podman tag
          localhost/engram-web:latest
          registry.starbluesolutions.net/engram-web:latest
      changed_when: true

    - name: Push build tag to registry
      ansible.builtin.command:
        cmd: podman push registry.starbluesolutions.net/engram-web:{{ build_number | default('latest') }}
      changed_when: true

    - name: Push latest tag to registry
      ansible.builtin.command:
        cmd: podman push registry.starbluesolutions.net/engram-web:latest
      changed_when: true

    - name: Copy quadlet container unit file
      ansible.builtin.copy:
        src: "{{ engram_web_src_dir }}/deploy/engram-web.container"
        dest: "{{ quadlet_dir }}/engram-web.container"
        remote_src: true
        mode: "0644"
      notify: Reload and restart engram-web

  handlers:
    - name: Reload user systemd daemon
      ansible.builtin.command:
        cmd: systemctl --user daemon-reload
      environment:
        XDG_RUNTIME_DIR: /run/user/1001
      listen: Reload and restart engram-web

    - name: Restart engram-web service
      ansible.builtin.command:
        cmd: systemctl --user restart engram-web
      environment:
        XDG_RUNTIME_DIR: /run/user/1001
      changed_when: true
      listen: Reload and restart engram-web
