---
# Deploy engram-web to tela
#
# Usage (run on tela with local connection):
#   ansible-playbook -i "127.0.0.1," deploy/ansible-deploy.yml \
#     --connection local -e engram_web_src_dir=<path>
#
# Variables:
#   engram_web_src_dir: path to checked-out repo on tela

- name: Deploy engram-web
  hosts: all
  gather_facts: false
  # No global become - podman build runs as the connected user (eddie)

  vars:
    service_name: engram-web
    quadlet_dir: /etc/containers/systemd
    engram_web_src_dir: "{{ ansible_env.HOME }}/engram-web"

  tasks:
    - name: Build container image from source (as eddie)
      ansible.builtin.command:
        cmd: >
          podman build
          -t localhost/engram-web:latest
          -f deploy/Dockerfile
          .
        chdir: "{{ engram_web_src_dir }}"
      changed_when: true

    - name: Copy quadlet container unit file (root)
      ansible.builtin.copy:
        src: "{{ engram_web_src_dir }}/deploy/engram-web.container"
        dest: "{{ quadlet_dir }}/{{ service_name }}.container"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      become: true
      notify: Reload and restart service

  handlers:
    - name: Reload and restart service
      block:
        - name: Reload systemd daemon
          ansible.builtin.systemd:
            daemon_reload: true
          become: true

        - name: Restart engram-web service
          ansible.builtin.systemd:
            name: "{{ service_name }}"
            state: restarted
            enabled: true
          become: true
